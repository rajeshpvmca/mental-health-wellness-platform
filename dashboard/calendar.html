<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar | Stackly Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background-color: var(--surface); padding: 1.5rem; font-family: "Source Sans 3", sans-serif; }
        .dash-card { background: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--outline-variant); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .cal-header { font-weight: bold; text-align: center; color: var(--muted); padding-bottom: 10px; }
        .cal-day { border: 1px solid var(--outline-variant); border-radius: 8px; min-height: 100px; padding: 10px; cursor: pointer; transition: background 0.2s; }
        .cal-day:hover { background: var(--surface-soft); }
        .cal-date { font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; }
        .cal-event { background: rgba(0, 107, 86, 0.1); color: var(--primary); font-size: 0.75rem; padding: 4px 6px; border-radius: 4px; font-weight: bold; margin-bottom: 4px; display: block; }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold mb-0" style="color: var(--ink);">Calendar</h3>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-secondary"><i class="fas fa-chevron-left"></i></button>
                <button class="btn btn-outline-secondary">October 2026</button>
                <button class="btn btn-outline-secondary"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <div class="dash-card">
            <div class="calendar-grid">
                <!-- Headers -->
                <div class="cal-header">Mon</div><div class="cal-header">Tue</div><div class="cal-header">Wed</div><div class="cal-header">Thu</div><div class="cal-header">Fri</div><div class="cal-header">Sat</div><div class="cal-header">Sun</div>
                
                <!-- Mock Days -->
                <div class="cal-day text-muted"><div class="cal-date">28</div></div>
                <div class="cal-day text-muted"><div class="cal-date">29</div></div>
                <div class="cal-day text-muted"><div class="cal-date">30</div></div>
                <div class="cal-day"><div class="cal-date">1</div></div>
                <div class="cal-day"><div class="cal-date">2</div><div class="cal-event">10am: Sarah J.</div></div>
                <div class="cal-day"><div class="cal-date">3</div></div>
                <div class="cal-day"><div class="cal-date">4</div></div>

                <div class="cal-day"><div class="cal-date">5</div></div>
                <div class="cal-day"><div class="cal-date">6</div></div>
                <div class="cal-day"><div class="cal-date">7</div><div class="cal-event">2pm: David R.</div></div>
                <div class="cal-day" style="border-color: var(--primary); background: rgba(0,107,86,0.02);"><div class="cal-date text-primary">8</div></div>
                <div class="cal-day"><div class="cal-date">9</div></div>
                <div class="cal-day"><div class="cal-date">10</div></div>
                <div class="cal-day"><div class="cal-date">11</div></div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
