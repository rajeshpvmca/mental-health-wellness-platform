<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/dash-page.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container-fluid py-4">
        <div class="card-header-row">
            <div>
                <h2 class="page-title">Inventory Management</h2>
                <p class="page-subtitle">Manage fresh harvest and organic products stock levels.</p>
            </div>
            <button class="btn-primary-dash"><i class="fas fa-plus me-2"></i> Add New Item</button>
        </div>

        <div class="content-card">
            <div class="table-wrap">
                <table class="dash-table">
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td data-label="Item" class="fw-bold">Organic Spinach</td>
                            <td data-label="Category">Vegetables</td>
                            <td data-label="Price">₹40.00</td>
                            <td data-label="Stock">85</td>
                            <td data-label="Status"><span class="status active">Available</span></td>
                            <td data-label="Actions">
                                <button class="btn btn-sm text-primary me-2"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-sm text-danger"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                        <tr>
                            <td data-label="Item" class="fw-bold">Alphonso Mango</td>
                            <td data-label="Category">Fruits</td>
                            <td data-label="Price">₹450.00</td>
                            <td data-label="Stock">0</td>
                            <td data-label="Status"><span class="status cancelled">Out of Stock</span></td>
                            <td data-label="Actions">
                                <button class="btn btn-sm text-primary me-2"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-sm text-danger"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
