<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultations | Meciy Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background-color: var(--surface); padding: 1.5rem; font-family: "Source Sans 3", sans-serif; }
        .dash-card { background: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--outline-variant); margin-bottom: 1.5rem; }
        .video-placeholder { background: #1a1a1a; border-radius: 12px; height: 350px; display: flex; align-items: center; justify-content: center; color: white; position: relative; overflow: hidden; }
        .video-controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 30px; display: flex; gap: 15px; }
        .video-controls button { background: transparent; border: none; color: white; font-size: 1.2rem; transition: 0.2s; cursor: pointer; }
        .video-controls button:hover { color: var(--primary-light); }
        .video-controls button.btn-danger { color: #dc3545; }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <h3 class="fw-bold mb-4" style="color: var(--ink);">Virtual Consultations</h3>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="dash-card p-2">
                    <div class="video-placeholder">
                        <div class="text-center">
                            <i class="fas fa-video-slash fs-1 text-muted mb-3"></i>
                            <h5>Camera is off</h5>
                            <p class="text-white-50 small mb-0">Waiting for patient to join...</p>
                        </div>
                        <div class="video-controls">
                            <button><i class="fas fa-microphone"></i></button>
                            <button><i class="fas fa-video"></i></button>
                            <button><i class="fas fa-desktop"></i></button>
                            <button class="btn-danger"><i class="fas fa-phone-slash"></i></button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="dash-card" style="height: calc(100% - 1.5rem);">
                    <h5 class="fw-bold mb-4">Current Session</h5>
                    <div class="d-flex align-items-center gap-3 mb-4">
                        <img src="https://ui-avatars.com/api/?name=Sarah+J" class="rounded-circle" width="50" alt="Patient">
                        <div>
                            <h6 class="fw-bold mb-0">Sarah Jenkins</h6>
                            <span class="badge bg-success bg-opacity-10 text-success small">Scheduled</span>
                        </div>
                    </div>
                    <hr>
                    <h6 class="fw-bold mt-4 mb-3">Quick Notes</h6>
                    <textarea class="form-control" rows="6" placeholder="Type your session notes here..."></textarea>
                    <button class="btn text-white w-100 mt-3" style="background: var(--primary);">Save Notes</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
