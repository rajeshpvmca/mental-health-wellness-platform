<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/dash-page.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .wallet-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-container) 100%);
            color: white;
            border-radius: 20px;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        .wallet-card::after {
            content: '\f06c'; /* fa-leaf */ font-family: 'Font Awesome 6 Free'; font-weight: 900;
            position: absolute; right: -20px; bottom: -20px; font-size: 8rem; opacity: 0.1;
        }
    </style>
</head>
<body>
    <div class="container-fluid py-4">
        <div class="card-header-row">
            <div>
                <h2 class="page-title">Digital Wallet</h2>
                <p class="page-subtitle">Manage your funds and quick checkout options.</p>
            </div>
            <button class="btn-primary-dash"><i class="fas fa-plus me-2"></i> Add Money</button>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-5">
                <div class="wallet-card shadow-lg">
                    <div class="small opacity-75 mb-1">Available Balance</div>
                    <h1 class="display-5 fw-bold mb-4">₹4,250.50</h1>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="small"><i class="fas fa-shield-alt me-1"></i> Securely encrypted</span>
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Visa_Inc._logo.svg/2560px-Visa_Inc._logo.svg.png" height="15" style="filter: brightness(0) invert(1) opacity(0.8);">
                    </div>
                </div>
            </div>
            <div class="col-md-7">
                <div class="content-card h-100">
                    <h5 class="content-card-title">Saved Payment Methods</h5>
                    <div class="d-flex align-items-center p-3 border rounded-3 mb-2">
                        <i class="fab fa-cc-visa fs-2 me-3 text-secondary"></i>
                        <div class="flex-grow-1">
                            <div class="fw-bold">Visa Card **** 4242</div>
                            <div class="small text-muted">Expires 12/26</div>
                        </div> 
                        <span class="badge bg-primary-fixed text-primary">Primary</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="content-card">
            <h5 class="content-card-title">Recent Transactions</h5>
            <div class="table-wrap">
                <table class="dash-table">
                    <thead>
                        <tr>
                            <th>Type</th>
                            <th>Description</th>
                            <th>Date</th>
                            <th>Amount</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><span class="badge bg-soft-danger text-danger"><i class="fas fa-arrow-up"></i></span></td>
                            <td>Order Payment - #ORG-92831</td>
                            <td>Oct 28, 2023</td>
                            <td class="fw-bold text-danger">-₹450.00</td>
                            <td><span class="status active">Success</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
