<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Appointments | Stackly Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background-color: var(--surface); padding: 1.5rem; font-family: "Source Sans 3", sans-serif; }
        .dash-card { background: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--outline-variant); }
        .action-btn { width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold mb-0" style="color: var(--ink);">All Appointments</h3>
        </div>
        
        <div class="dash-card">
            <div class="row mb-4 g-3">
                <div class="col-md-3">
                    <input type="date" class="form-control">
                </div>
                <div class="col-md-3">
                    <select class="form-select">
                        <option value="">All Therapists</option>
                        <option value="1">Dr. Alice Peterson</option>
                        <option value="2">Dr. Robert Smith</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select class="form-select">
                        <option value="">Status</option>
                        <option value="confirmed">Confirmed</option>
                        <option value="pending">Pending</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button class="btn text-white w-100" style="background: var(--primary);">Filter</button>
                </div>
            </div>
            
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Date & Time</th>
                            <th>Patient</th>
                            <th>Therapist</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Oct 24, 10:00 AM</td>
                            <td>Sarah Connor</td>
                            <td>Dr. Alice Peterson</td>
                            <td><i class="fas fa-video text-primary me-2"></i>Video</td>
                            <td><span class="badge bg-success">Confirmed</span></td>
                            <td>
                                <button class="btn btn-sm btn-light action-btn" title="View Details"><i class="fas fa-eye text-primary"></i></button>
                                <button class="btn btn-sm btn-light action-btn" title="Cancel Appointment"><i class="fas fa-times text-danger"></i></button>
                            </td>
                        </tr>
                        <tr>
                            <td>Oct 24, 11:30 AM</td>
                            <td>John Doe</td>
                            <td>Dr. Robert Smith</td>
                            <td><i class="fas fa-user-md text-info me-2"></i>In-Person</td>
                            <td><span class="badge bg-warning text-dark">Pending</span></td>
                            <td>
                                <button class="btn btn-sm btn-light action-btn" title="View Details"><i class="fas fa-eye text-primary"></i></button>
                                <button class="btn btn-sm btn-light action-btn" title="Cancel Appointment"><i class="fas fa-times text-danger"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
