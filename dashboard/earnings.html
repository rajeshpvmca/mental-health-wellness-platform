<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earnings | Stackly Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background-color: var(--surface); padding: 1.5rem; font-family: "Source Sans 3", sans-serif; }
        .dash-card { background: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--outline-variant); margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <h3 class="fw-bold mb-4" style="color: var(--ink);">Earnings Overview</h3>

        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="dash-card bg-primary text-white" style="border: none;">
                    <h6 class="text-white-50">Available for Payout</h6>
                    <h2 class="fw-bold mb-0">$1,240.50</h2>
                    <button class="btn btn-light btn-sm mt-3 fw-bold">Withdraw Funds</button>
                </div>
            </div>
            <div class="col-md-4">
                <div class="dash-card">
                    <h6 class="text-muted">Total Earned This Month</h6>
                    <h2 class="fw-bold mb-0 text-dark">$3,450.00</h2>
                    <p class="text-success small mb-0 mt-2"><i class="fas fa-arrow-up me-1"></i> +12% from last month</p>
                </div>
            </div>
        </div>

        <div class="dash-card">
            <h5 class="fw-bold mb-4">Revenue Trend (Last 6 Months)</h5>
            <canvas id="earningsChart" height="100"></canvas>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const ctx = document.getElementById('earningsChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct'],
                datasets: [{
                    label: 'Earnings ($)',
                    data: [2100, 2400, 2300, 3100, 3050, 3450],
                    backgroundColor: '#15b392',
                    borderRadius: 6
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, grid: { borderDash: [5, 5] } }, x: { grid: { display: false } } }
            }
        });
    </script>
</body>
</html>
