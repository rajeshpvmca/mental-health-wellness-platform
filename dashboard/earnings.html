<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/dash-page.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container-fluid py-4">
        <div class="card-header-row">
            <div>
                <h2 class="page-title">Earnings Overview</h2>
                <p class="page-subtitle">Track your daily income and delivery incentives.</p>
            </div>
            <button class="btn-outline-dash btn-sm"><i class="fas fa-download me-2"></i>Statement</button>
        </div>

        <div class="grid-4 mb-4">
            <div class="stat-card">
                <div class="stat-icon green"><i class="fas fa-wallet"></i></div>
                <div>
                    <div class="stat-value">₹850</div>
                    <div class="stat-label">Today's Pay</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orange"><i class="fas fa-calendar-check"></i></div>
                <div>
                    <div class="stat-value">₹5,240</div>
                    <div class="stat-label">This Week</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon blue"><i class="fas fa-gift"></i></div>
                <div>
                    <div class="stat-value">₹300</div>
                    <div class="stat-label">Incentives</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon purple"><i class="fas fa-coins"></i></div>
                <div>
                    <div class="stat-value">₹1,200</div>
                    <div class="stat-label">Pending Payout</div>
                </div>
            </div>
        </div>

        <div class="content-card">
            <h5 class="content-card-title">Daily Earnings Trend</h5>
            <canvas id="earningsChart" height="100"></canvas>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('earningsChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                datasets: [{
                    label: 'Earnings (₹)',
                    data: [450, 600, 550, 800, 700, 950, 850],
                    backgroundColor: '#154212',
                    borderRadius: 8
                }]
            },
            options: { 
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, grid: { display: false } },
                    x: { grid: { display: false } }
                }
            }
        });
    </script>
</body>
</html>
