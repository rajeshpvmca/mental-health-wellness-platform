<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/dash-page.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container-fluid py-4">
        <div class="card-header-row">
            <div>
                <h2 class="page-title">Platform Orders</h2>
                <p class="page-subtitle">Monitor and manage all customer requests and fulfillment status.</p>
            </div>
            <div class="search-box">
                <input type="text" class="form-ctrl py-2" placeholder="Search Order ID...">
            </div>
        </div>

        <div class="content-card">
            <div class="table-wrap">
                <table class="dash-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Farm Source</th>
                            <th>Partner</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="fw-bold">#ORG-9201</td>
                            <td>Sarah Jenkins</td>
                            <td>Green Valley</td>
                            <td>Mike Swift</td>
                            <td class="fw-bold text-primary">₹840.00</td>
                            <td><span class="status pending">Processing</span></td>
                            <td><button class="btn btn-sm btn-outline-dash py-1">Details</button></td>
                        </tr>
                        <tr>
                            <td class="fw-bold">#ORG-9195</td>
                            <td>John Doe</td>
                            <td>Sunshine Orchards</td>
                            <td>Unassigned</td>
                            <td class="fw-bold text-primary">₹1,250.00</td>
                            <td><span class="status cancelled">Waiting Partner</span></td>
                            <td><button class="btn btn-sm btn-outline-dash py-1">Assign</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
