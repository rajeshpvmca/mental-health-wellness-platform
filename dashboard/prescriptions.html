<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prescriptions | Meciy Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background-color: var(--surface); padding: 1.5rem; font-family: "Source Sans 3", sans-serif; }
        .dash-card { background: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--outline-variant); margin-bottom: 1.5rem; }
        .rx-badge { background-color: rgba(21, 179, 146, 0.1); color: var(--primary-light); padding: 5px 10px; border-radius: 6px; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <h3 class="fw-bold mb-4" style="color: var(--ink);">My Prescriptions</h3>

        <div class="dash-card">
            <h5 class="fw-bold mb-4">Active Medications</h5>
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="border rounded-3 p-3 position-relative">
                        <span class="rx-badge position-absolute top-0 end-0 m-3">Daily</span>
                        <div class="d-flex gap-3 mb-3">
                            <div class="text-primary fs-2"><i class="fas fa-pills"></i></div>
                            <div>
                                <h5 class="fw-bold mb-1">Fluoxetine 20mg</h5>
                                <p class="text-muted mb-0 small">Prescribed by Dr. Alice Peterson</p>
                            </div>
                        </div>
                        <p class="mb-3">Take 1 capsule by mouth daily in the morning with food.</p>
                        <button class="btn btn-sm btn-outline-secondary"><i class="fas fa-download me-1"></i> Download PDF</button>
                        <button class="btn btn-sm btn-outline-primary"><i class="fas fa-redo me-1"></i> Request Refill</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="dash-card">
            <h5 class="fw-bold mb-4">Past Prescriptions</h5>
            <p class="text-muted">No past prescription history.</p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
