<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/dash-page.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container-fluid py-4">
        <div class="card-header-row">
            <div>
                <h2 class="page-title">Coupons & Promos</h2>
                <p class="page-subtitle">Manage platform-wide discount codes and special offers.</p>
            </div>
            <button class="btn-primary-dash"><i class="fas fa-plus me-2"></i> Create New Coupon</button>
        </div>

        <div class="content-card">
            <div class="table-wrap">
                <table class="dash-table">
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Discount</th>
                            <th>Type</th>
                            <th>Expiry</th>
                            <th>Usage</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="fw-bold text-primary">WELCOME50</td>
                            <td>50% OFF</td>
                            <td>First Order</td>
                            <td>Dec 31, 2026</td>
                            <td>1,240 times</td>
                            <td><span class="status active">Active</span></td>
                            <td><button class="btn btn-sm text-danger"><i class="fas fa-trash"></i></button></td>
                        </tr>
                        <tr>
                            <td class="fw-bold text-primary">FREESHIP</td>
                            <td>FREE</td>
                            <td>Delivery</td>
                            <td>Permanent</td>
                            <td>8,420 times</td>
                            <td><span class="status active">Active</span></td>
                            <td><button class="btn btn-sm text-danger"><i class="fas fa-trash"></i></button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
