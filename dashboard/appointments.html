<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Appointments | Stackly Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background-color: var(--surface); padding: 1.5rem; font-family: "Source Sans 3", sans-serif; }
        .dash-card { background: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--outline-variant); margin-bottom: 1.5rem; }
        .nav-pills .nav-link.active { background-color: var(--primary); }
        .nav-pills .nav-link { color: var(--ink); border-radius: 30px; padding: 0.5rem 1.5rem; }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold mb-0" style="color: var(--ink);">Appointments</h3>
            <button class="btn text-white" style="background: var(--primary); border-radius: 30px;"><i class="fas fa-plus me-2"></i>Book New</button>
        </div>

        <div class="dash-card">
            <ul class="nav nav-pills mb-4" id="pills-tab" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active fw-bold" data-bs-toggle="pill" data-bs-target="#upcoming">Upcoming</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link fw-bold" data-bs-toggle="pill" data-bs-target="#past">Past History</button>
                </li>
            </ul>

            <div class="tab-content" id="pills-tabContent">
                <div class="tab-pane fade show active" id="upcoming">
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Therapist</th>
                                    <th>Date & Time</th>
                                    <th>Type</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>
                                        <div class="d-flex align-items-center gap-2">
                                            <img src="https://ui-avatars.com/api/?name=Dr.+Alice&background=006b56&color=fff" class="rounded-circle" width="35" alt="Dr">
                                            <span class="fw-bold">Dr. Alice Peterson</span>
                                        </div>
                                    </td>
                                    <td>Oct 24, 2026<br><small class="text-muted">10:00 AM</small></td>
                                    <td><i class="fas fa-video text-muted me-1"></i> Video</td>
                                    <td><span class="badge bg-success">Confirmed</span></td>
                                    <td>
                                        <button class="btn btn-sm btn-outline-primary rounded-pill">Reschedule</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="tab-pane fade" id="past">
                    <p class="text-muted">No past appointments found.</p>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
