<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/dash-page.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container-fluid py-4">
        <div class="card-header-row">
            <div>
                <h2 class="page-title">My Favorites</h2>
                <p class="page-subtitle">Quick access to the farm-fresh products you love the most.</p>
            </div>
        </div>

        <div class="row g-4">
            <!-- Favorite Item 1 -->
            <div class="col-xl-3 col-lg-4 col-md-6">
                <div class="product-card bg-white p-4 rounded-3xl shadow-sm border border-outline-variant hover-shadow-premium h-100 d-flex flex-column text-center">
                    <div class="position-relative ratio ratio-1x1 mb-4 overflow-hidden rounded-2xl">
                        <img src="../assets/images/hot-product-1.webp" class="object-fit-cover" alt="Organic Bananas">
                    </div>
                    <div class="px-2 flex-grow-1">
                        <span class="text-secondary font-label-sm text-uppercase fw-bold mb-1 d-block">Fresh Fruits</span>
                        <h3 class="font-headline-md text-primary mb-2" style="font-size: 1.25rem;">Organic Bananas</h3>
                        <div class="text-primary fw-bold mb-3 fs-5">$4.99</div>
                    </div>
                    <button class="thm-btn w-100 btn-fill-right mb-2">
                        Add to cart <i class="fas fa-cart-plus ms-1"></i>
                    </button>
                    <button class="btn btn-sm text-danger border-0 bg-transparent"><i class="fas fa-trash-alt me-1"></i> Remove</button>
                </div>
            </div>

            <!-- Favorite Item 2 -->
            <div class="col-xl-3 col-lg-4 col-md-6">
                <div class="product-card bg-white p-4 rounded-3xl shadow-sm border border-outline-variant hover-shadow-premium h-100 d-flex flex-column text-center">
                    <div class="position-relative ratio ratio-1x1 mb-4 overflow-hidden rounded-2xl">
                        <img src="../assets/images/hot-product-2.webp" class="object-fit-cover" alt="Organic Potatoes">
                    </div>
                    <div class="px-2 flex-grow-1">
                        <span class="text-secondary font-label-sm text-uppercase fw-bold mb-1 d-block">Vegetables</span>
                        <h3 class="font-headline-md text-primary mb-2" style="font-size: 1.25rem;">Organic Potatoes</h3>
                        <div class="text-primary fw-bold mb-3 fs-5">$3.49</div>
                    </div>
                    <button class="thm-btn w-100 btn-fill-right mb-2">
                        Add to cart <i class="fas fa-cart-plus ms-1"></i>
                    </button>
                    <button class="btn btn-sm text-danger border-0 bg-transparent"><i class="fas fa-trash-alt me-1"></i> Remove</button>
                </div>
            </div>

            <!-- Favorite Item 3 -->
            <div class="col-xl-3 col-lg-4 col-md-6">
                <div class="product-card bg-white p-4 rounded-3xl shadow-sm border border-outline-variant hover-shadow-premium h-100 d-flex flex-column text-center">
                    <div class="position-relative ratio ratio-1x1 mb-4 overflow-hidden rounded-2xl">
                        <img src="../assets/images/hot-product-3.webp" class="object-fit-cover" alt="Organic Apples">
                    </div>
                    <div class="px-2 flex-grow-1">
                        <span class="text-secondary font-label-sm text-uppercase fw-bold mb-1 d-block">Fresh Fruits</span>
                        <h3 class="font-headline-md text-primary mb-2" style="font-size: 1.25rem;">Organic Apples</h3>
                        <div class="text-primary fw-bold mb-3 fs-5">$5.99</div>
                    </div>
                    <button class="thm-btn w-100 btn-fill-right mb-2">
                        Add to cart <i class="fas fa-cart-plus ms-1"></i>
                    </button>
                    <button class="btn btn-sm text-danger border-0 bg-transparent"><i class="fas fa-trash-alt me-1"></i> Remove</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
