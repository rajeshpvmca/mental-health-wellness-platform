<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/dash-page.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container-fluid py-4">
        <div class="card-header-row">
            <div>
                <h2 class="page-title">Farm Partners</h2>
                <p class="page-subtitle">Manage your network of certified organic suppliers.</p>
            </div>
            <button class="btn-primary-dash"><i class="fas fa-plus me-2"></i> Onboard New Farm</button>
        </div>

        <div class="row g-4">
            <div class="col-md-6">
                <div class="content-card h-100">
                    <div class="d-flex align-items-center gap-3 mb-3">
                        <div class="stat-icon green"><i class="fas fa-seedling"></i></div>
                        <div class="flex-grow-1">
                            <h5 class="fw-bold mb-0">Green Valley Organic Farm</h5>
                            <span class="small text-muted">Salem North, Tamil Nadu</span>
                        </div>
                        <span class="badge bg-primary-fixed text-primary">Gold Partner</span>
                    </div>
                    <div class="row text-center g-2 mb-3">
                        <div class="col-4 border-end"><strong>42</strong><br><small class="text-muted">Items</small></div>
                        <div class="col-4 border-end"><strong>1.2k</strong><br><small class="text-muted">Supplied</small></div>
                        <div class="col-4"><strong>4.9</strong><br><small class="text-muted">Rating</small></div>
                    </div>
                    <button class="btn btn-outline-dash w-100">Manage Supplies</button>
                </div>
            </div>
            <div class="col-md-6">
                <div class="content-card h-100">
                    <div class="d-flex align-items-center gap-3 mb-3">
                        <div class="stat-icon green"><i class="fas fa-tree"></i></div>
                        <div class="flex-grow-1">
                            <h5 class="fw-bold mb-0">Sunshine Orchards</h5>
                            <span class="small text-muted">Ooty Road, Coimbatore</span>
                        </div>
                        <span class="badge bg-primary-fixed text-primary">Silver Partner</span>
                    </div>
                    <div class="row text-center g-2 mb-3">
                        <div class="col-4 border-end"><strong>15</strong><br><small class="text-muted">Items</small></div>
                        <div class="col-4 border-end"><strong>850</strong><br><small class="text-muted">Supplied</small></div>
                        <div class="col-4"><strong>4.7</strong><br><small class="text-muted">Rating</small></div>
                    </div>
                    <button class="btn btn-outline-dash w-100">Manage Supplies</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
