<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/dash-page.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container-fluid py-4">
        <div class="card-header-row">
            <div>
                <h2 class="page-title">User Control Panel</h2>
                <p class="page-subtitle">Manage accounts, roles, and platform permissions.</p>
            </div>
        </div>

        <div class="content-card">
            <div class="table-wrap">
                <table class="dash-table">
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Role</th>
                            <th>Joined Date</th>
                            <th>Total Orders</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="user-avatar me-2" style="width:32px; height:32px; font-size:0.8rem;">JD</div>
                                    <div>
                                        <div class="fw-bold">John Doe</div>
                                        <div class="small text-muted">john@example.com</div>
                                    </div>
                                </div>
                            </td>
                            <td><span class="badge bg-primary-fixed text-primary">Customer</span></td>
                            <td>Oct 15, 2023</td>
                            <td>12</td>
                            <td><span class="status active">Active</span></td>
                            <td>
                                <button class="btn btn-sm text-primary"><i class="fas fa-user-edit"></i></button>
                                <button class="btn btn-sm text-danger"><i class="fas fa-ban"></i></button>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="user-avatar me-2" style="width:32px; height:32px; font-size:0.8rem; background: var(--secondary);">MS</div>
                                    <div>
                                        <div class="fw-bold">Mike Swift</div>
                                        <div class="small text-muted">mike@delivery.com</div>
                                    </div>
                                </div>
                            </td>
                            <td><span class="badge bg-accent text-white">Partner</span></td>
                            <td>Sep 20, 2023</td>
                            <td>145</td>
                            <td><span class="status active">On Duty</span></td>
                            <td>
                                <button class="btn btn-sm text-primary"><i class="fas fa-user-edit"></i></button>
                                <button class="btn btn-sm text-danger"><i class="fas fa-ban"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
