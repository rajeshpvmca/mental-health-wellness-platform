<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Patients | Meciy Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background-color: var(--surface); padding: 1.5rem; font-family: "Source Sans 3", sans-serif; }
        .dash-card { background: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--outline-variant); margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <h3 class="fw-bold mb-4" style="color: var(--ink);">Patient Directory</h3>

        <div class="dash-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <input type="text" class="form-control w-25" placeholder="Search patients...">
            </div>
            <div class="table-responsive">
                <table class="table align-middle table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>Patient Name</th>
                            <th>Status</th>
                            <th>Last Session</th>
                            <th>Next Scheduled</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <img src="https://ui-avatars.com/api/?name=Sarah+J" class="rounded-circle" width="40" alt="Patient">
                                    <div>
                                        <h6 class="mb-0 fw-bold">Sarah Jenkins</h6>
                                        <small class="text-muted">ID: #PT-842</small>
                                    </div>
                                </div>
                            </td>
                            <td><span class="badge bg-success bg-opacity-10 text-success">Active</span></td>
                            <td>Oct 10, 2026</td>
                            <td>Oct 24, 2026</td>
                            <td><button class="btn btn-sm btn-outline-primary rounded-pill">View Profile</button></td>
                        </tr>
                        <tr>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <img src="https://ui-avatars.com/api/?name=David+R" class="rounded-circle" width="40" alt="Patient">
                                    <div>
                                        <h6 class="mb-0 fw-bold">David Ross</h6>
                                        <small class="text-muted">ID: #PT-192</small>
                                    </div>
                                </div>
                            </td>
                            <td><span class="badge bg-secondary bg-opacity-10 text-secondary">Discharged</span></td>
                            <td>Sep 15, 2026</td>
                            <td>-</td>
                            <td><button class="btn btn-sm btn-outline-primary rounded-pill">View Profile</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
