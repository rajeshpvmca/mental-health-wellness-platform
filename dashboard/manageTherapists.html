<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Therapists | Stackly Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background-color: var(--surface); padding: 1.5rem; font-family: "Source Sans 3", sans-serif; }
        .dash-card { background: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--outline-variant); }
        .action-btn { width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold mb-0" style="color: var(--ink);">Manage Therapists</h3>
            <button class="btn text-white" style="background: var(--primary);"><i class="fas fa-plus me-2"></i>Add Therapist</button>
        </div>
        
        <div class="dash-card">
            <div class="row mb-3">
                <div class="col-md-4">
                    <input type="text" class="form-control" placeholder="Search therapists...">
                </div>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Therapist Name</th>
                            <th>Specialization</th>
                            <th>Email</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <img src="https://ui-avatars.com/api/?name=Alice+Peterson&background=006b56&color=fff" class="rounded-circle" width="35" alt="Dr">
                                    <span class="fw-bold">Dr. Alice Peterson</span>
                                </div>
                            </td>
                            <td>Clinical Psychology</td>
                            <td>alice.p@stackly.com</td>
                            <td><span class="badge bg-success">Active</span></td>
                            <td>
                                <button class="btn btn-sm btn-light action-btn"><i class="fas fa-edit text-primary"></i></button>
                                <button class="btn btn-sm btn-light action-btn"><i class="fas fa-trash text-danger"></i></button>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <img src="https://ui-avatars.com/api/?name=Robert+Smith&background=006b56&color=fff" class="rounded-circle" width="35" alt="Dr">
                                    <span class="fw-bold">Dr. Robert Smith</span>
                                </div>
                            </td>
                            <td>Cognitive Behavioral Therapy</td>
                            <td>robert.s@stackly.com</td>
                            <td><span class="badge bg-secondary">On Leave</span></td>
                            <td>
                                <button class="btn btn-sm btn-light action-btn"><i class="fas fa-edit text-primary"></i></button>
                                <button class="btn btn-sm btn-light action-btn"><i class="fas fa-trash text-danger"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('button, a.btn, .action-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                window.top.location.href = '../404.html';
            });
        });
    });
</script>
</body>
</html>
