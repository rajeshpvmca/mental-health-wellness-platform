<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/dash-page.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container-fluid py-4">
        <div class="card-header-row">
            <div>
                <h2 class="page-title">Active Delivery Tasks</h2>
                <p class="page-subtitle">Pick up fresh harvest from farms and deliver to customers.</p>
            </div>
            <div class="badge bg-success p-2 px-3 rounded-pill">Online & Ready</div>
        </div>

        <!-- Task Card 1 -->
        <div class="content-card border-start border-4 border-primary shadow-sm mb-4">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <div class="d-flex align-items-center gap-2 mb-3">
                        <span class="badge bg-primary-fixed text-primary">ID: #ORG-5501</span>
                        <span class="status pending">In Progress</span>
                    </div>
                    <div class="row">
                        <div class="col-sm-6 mb-3 mb-sm-0">
                            <div class="small text-muted text-uppercase fw-bold mb-1">Pickup (Farm)</div>
                            <div class="fw-bold text-primary"><i class="fas fa-seedling me-2"></i>Green Valley Organic Farm</div>
                            <div class="small text-muted">Salem North, TN</div>
                        </div>
                        <div class="col-sm-6">
                            <div class="small text-muted text-uppercase fw-bold mb-1">Delivery (Customer)</div>
                            <div class="fw-bold text-secondary"><i class="fas fa-map-marker-alt me-2"></i>John Doe</div>
                            <div class="small text-muted">Fairlands, Salem</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 text-md-end mt-3 mt-md-0">
                    <div class="mb-3">
                        <span class="small text-muted d-block">Est. Earning</span>
                        <span class="fw-bold h5 text-primary">₹85.00</span>
                    </div>
                    <div class="d-flex gap-2 justify-content-md-end">
                        <button class="btn btn-outline-secondary btn-sm rounded-pill px-3">View Map</button>
                        <button class="btn-primary-dash btn-sm">Pick Up Done</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty State (Optional example) -->
        <!-- <div class="empty-state">
            <i class="fas fa-truck-loading"></i>
            <p>No more active tasks. Take a break or wait for new orders!</p>
        </div> -->
    </div>
</body>
</html>
