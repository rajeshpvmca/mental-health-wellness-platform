<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Therapist Dashboard | Stackly Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background-color: var(--surface); padding: 1.5rem; font-family: "Source Sans 3", sans-serif; }
        .dash-card { background: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--outline-variant); height: 100%; }
        .icon-circle { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <h3 class="fw-bold mb-4" style="color: var(--ink);">Welcome back, Dr. Peterson!</h3>

        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="dash-card d-flex align-items-center gap-3 py-3">
                    <div class="icon-circle bg-soft-primary" style="background: rgba(0, 107, 86, 0.1); color: var(--primary);"><i class="fas fa-video"></i></div>
                    <div><h6 class="mb-0 text-muted">Sessions Today</h6><h4 class="mb-0 fw-bold">5</h4></div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="dash-card d-flex align-items-center gap-3 py-3">
                    <div class="icon-circle" style="background: rgba(13, 202, 240, 0.1); color: #0dcaf0;"><i class="fas fa-users"></i></div>
                    <div><h6 class="mb-0 text-muted">Active Patients</h6><h4 class="mb-0 fw-bold">42</h4></div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="dash-card d-flex align-items-center gap-3 py-3">
                    <div class="icon-circle" style="background: rgba(255, 193, 7, 0.1); color: #ffc107;"><i class="fas fa-clipboard-list"></i></div>
                    <div><h6 class="mb-0 text-muted">Pending Notes</h6><h4 class="mb-0 fw-bold">2</h4></div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="dash-card d-flex align-items-center gap-3 py-3">
                    <div class="icon-circle" style="background: rgba(32, 201, 151, 0.1); color: #20c997;"><i class="fas fa-star"></i></div>
                    <div><h6 class="mb-0 text-muted">Avg Rating</h6><h4 class="mb-0 fw-bold">4.9</h4></div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="dash-card">
                    <h5 class="fw-bold mb-4">Today's Schedule</h5>
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <tbody>
                                <tr>
                                    <td>10:00 AM</td>
                                    <td>
                                        <div class="d-flex align-items-center gap-2">
                                            <img src="https://ui-avatars.com/api/?name=Sarah+J" class="rounded-circle" width="35" alt="Patient">
                                            <span class="fw-bold">Sarah Jenkins</span>
                                        </div>
                                    </td>
                                    <td><span class="badge bg-primary rounded-pill">Upcoming</span></td>
                                    <td class="text-end"><button class="btn btn-sm text-white" style="background: var(--primary);">Join Call</button></td>
                                </tr>
                                <tr>
                                    <td>11:30 AM</td>
                                    <td>
                                        <div class="d-flex align-items-center gap-2">
                                            <img src="https://ui-avatars.com/api/?name=David+R" class="rounded-circle" width="35" alt="Patient">
                                            <span class="fw-bold">David Ross</span>
                                        </div>
                                    </td>
                                    <td><span class="badge bg-light text-dark rounded-pill">Waitlisted</span></td>
                                    <td class="text-end"><button class="btn btn-sm btn-outline-secondary" disabled>Join Call</button></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="dash-card">
                    <h5 class="fw-bold mb-4">Quick Actions</h5>
                    <button class="btn btn-outline-primary w-100 mb-3"><i class="fas fa-file-medical me-2"></i>Write Assessment Note</button>
                    <button class="btn btn-outline-primary w-100 mb-3"><i class="fas fa-prescription-bottle-alt me-2"></i>New Prescription</button>
                    <button class="btn btn-outline-primary w-100"><i class="fas fa-calendar-plus me-2"></i>Schedule Follow-up</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('button, a.btn, .action-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                window.top.location.href = '../404.html';
            });
        });
    });
</script>
</body>
</html>
