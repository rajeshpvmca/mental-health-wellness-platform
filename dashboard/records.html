<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Records | Stackly Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background-color: var(--surface); padding: 1.5rem; font-family: "Source Sans 3", sans-serif; }
        .dash-card { background: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--outline-variant); margin-bottom: 1.5rem; }
        .record-icon { width: 50px; height: 50px; border-radius: 10px; background: rgba(0, 107, 86, 0.1); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <h3 class="fw-bold mb-4" style="color: var(--ink);">Medical Records</h3>

        <div class="dash-card">
            <div class="d-flex align-items-center justify-content-between mb-4 border-bottom pb-3">
                <div class="d-flex align-items-center gap-3">
                    <div class="record-icon"><i class="fas fa-file-pdf"></i></div>
                    <div>
                        <h6 class="fw-bold mb-1">Initial Assessment Report</h6>
                        <small class="text-muted">Added: Sept 10, 2026 &bull; Dr. Alice Peterson</small>
                    </div>
                </div>
                <button class="btn btn-outline-primary btn-sm rounded-pill px-3"><i class="fas fa-eye me-1"></i> View</button>
            </div>
            <div class="d-flex align-items-center justify-content-between border-bottom pb-3">
                <div class="d-flex align-items-center gap-3">
                    <div class="record-icon"><i class="fas fa-clipboard-list"></i></div>
                    <div>
                        <h6 class="fw-bold mb-1">Anxiety Screening Questionnaire (GAD-7)</h6>
                        <small class="text-muted">Added: Sept 01, 2026 &bull; System</small>
                    </div>
                </div>
                <button class="btn btn-outline-primary btn-sm rounded-pill px-3"><i class="fas fa-eye me-1"></i> View</button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
