<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing & Payments | Meciy Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background-color: var(--surface); padding: 1.5rem; font-family: "Source Sans 3", sans-serif; }
        .dash-card { background: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--outline-variant); margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <h3 class="fw-bold mb-4" style="color: var(--ink);">Billing & Payments</h3>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="dash-card">
                    <h5 class="fw-bold mb-4">Payment History</h5>
                    <div class="table-responsive">
                        <table class="table align-middle text-nowrap">
                            <thead class="table-light">
                                <tr>
                                    <th>Date</th>
                                    <th>Description</th>
                                    <th>Amount</th>
                                    <th>Status</th>
                                    <th>Invoice</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>Oct 10, 2026</td>
                                    <td>Therapy Session - Dr. Alice</td>
                                    <td>$120.00</td>
                                    <td><span class="badge bg-success">Paid</span></td>
                                    <td><button class="btn btn-sm text-primary"><i class="fas fa-download"></i></button></td>
                                </tr>
                                <tr>
                                    <td>Sep 25, 2026</td>
                                    <td>Initial Assessment</td>
                                    <td>$150.00</td>
                                    <td><span class="badge bg-success">Paid</span></td>
                                    <td><button class="btn btn-sm text-primary"><i class="fas fa-download"></i></button></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="dash-card">
                    <h5 class="fw-bold mb-4">Payment Methods</h5>
                    <div class="border rounded-3 p-3 mb-3 d-flex justify-content-between align-items-center">
                        <div class="d-flex align-items-center gap-3">
                            <i class="fab fa-cc-visa fs-3 text-primary"></i>
                            <div>
                                <h6 class="mb-0 fw-bold">Visa ending in 4242</h6>
                                <small class="text-muted">Expires 12/28</small>
                            </div>
                        </div>
                        <button class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></button>
                    </div>
                    <button class="btn btn-outline-primary w-100 rounded-pill"><i class="fas fa-plus me-1"></i> Add Payment Method</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
