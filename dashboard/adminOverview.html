<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/dash-page.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container-fluid py-4">
        <div class="card-header-row">
            <div>
                <h2 class="page-title">Admin Dashboard Overview</h2>
                <p class="page-subtitle">Real-time monitoring of users, revenue, and platform operations.</p>
            </div>
        </div>

        <div class="grid-4 mb-4">
            <div class="stat-card">
                <div class="stat-icon blue"><i class="fas fa-users"></i></div>
                <div>
                    <div class="stat-value">1,250</div>
                    <div class="stat-label">Total Users</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green"><i class="fas fa-chart-line"></i></div>
                <div>
                    <div class="stat-value">₹4,52,000</div>
                    <div class="stat-label">Total Revenue</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orange"><i class="fas fa-shopping-bag"></i></div>
                <div>
                    <div class="stat-value">84</div>
                    <div class="stat-label">Active Orders</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon purple"><i class="fas fa-truck"></i></div>
                <div>
                    <div class="stat-value">120</div>
                    <div class="stat-label">Online Partners</div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-7">
                <div class="content-card h-100">
                    <h5 class="content-card-title">Revenue Growth Trend</h5>
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>
            <div class="col-lg-5">
                <div class="content-card h-100">
                    <h5 class="content-card-title">Sales by Cuisine Category</h5>
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        new Chart(document.getElementById('revenueChart').getContext('2d'), {
            type: 'line',
            data: {
                labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'],
                datasets: [{
                    label: 'Revenue',
                    data: [8000, 12000, 10000, 15200],
                    borderColor: '#ff4112',
                    fill: true,
                    backgroundColor: 'rgba(255, 65, 18, 0.1)',
                    tension: 0.4
                }]
            }
        });

        new Chart(document.getElementById('categoryChart').getContext('2d'), {
            type: 'doughnut',
            data: {
                labels: ['Vegetables', 'Fruits', 'Spices', 'Dairy'],
                datasets: [{
                    data: [40, 30, 20, 10],
                    backgroundColor: ['#154212', '#416900', '#f97316', '#8b5cf6']
                }]
            },
            options: { plugins: { legend: { position: 'bottom' } } }
        });
    </script>
</body>
</html>
