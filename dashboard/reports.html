<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/dash-page.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container-fluid py-4">
        <div class="card-header-row">
            <div>
                <h2 class="page-title">Business Reports</h2>
                <p class="page-subtitle">Comprehensive analysis of sales, growth, and user retention.</p>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-secondary btn-sm"><i class="fas fa-print me-1"></i> Print</button>
                <button class="btn-primary-dash btn-sm">Export CSV</button>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="content-card text-center">
                    <p class="stat-label">Net Profit (Monthly)</p>
                    <h2 class="stat-value text-success">$12,450.00</h2>
                    <p class="small text-muted mt-2"><i class="fas fa-caret-up text-success"></i> +12% from last month</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="content-card text-center">
                    <p class="stat-label">Customer Acquisition Cost</p>
                    <h2 class="stat-value text-primary">$4.20</h2>
                    <p class="small text-muted mt-2"><i class="fas fa-caret-down text-danger"></i> -5% improvement</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="content-card text-center">
                    <p class="stat-label">Order Completion Rate</p>
                    <h2 class="stat-value text-info">98.5%</h2>
                    <p class="small text-muted mt-2"><i class="fas fa-check-circle text-info"></i> Optimal Performance</p>
                </div>
            </div>
            <div class="col-12">
                <div class="content-card">
                    <h5 class="content-card-title">User Growth Trend (2026)</h5>
                    <canvas id="growthChart" height="80"></canvas>
                </div>
            </div>
        </div>
    </div>
    <script>
        new Chart(document.getElementById('growthChart'), {
            type: 'bar',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [{ label: 'New Users', data: [400, 600, 800, 750, 1100, 1250], backgroundColor: '#ff4112' }]
            }
        });
    </script>
</body>
</html>
