<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Patients | Stackly Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background-color: var(--surface); padding: 1.5rem; font-family: "Source Sans 3", sans-serif; }
        .dash-card { background: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--outline-variant); }
        .action-btn { width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold mb-0" style="color: var(--ink);">Manage Patients</h3>
            <button class="btn text-white" style="background: var(--primary);"><i class="fas fa-user-plus me-2"></i>Add Patient</button>
        </div>
        
        <div class="dash-card">
            <div class="row mb-3">
                <div class="col-md-4">
                    <input type="text" class="form-control" placeholder="Search patients by name or ID...">
                </div>
                <div class="col-md-3">
                    <select class="form-select">
                        <option value="">All Statuses</option>
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                    </select>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Patient ID</th>
                            <th>Patient Name</th>
                            <th>Email</th>
                            <th>Last Visit</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>#PT-8821</td>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <span class="fw-bold">Sarah Connor</span>
                                </div>
                            </td>
                            <td>sarah.c@example.com</td>
                            <td>Oct 15, 2023</td>
                            <td><span class="badge bg-success">Active</span></td>
                            <td>
                                <button class="btn btn-sm btn-light action-btn" title="View Profile"><i class="fas fa-eye text-primary"></i></button>
                                <button class="btn btn-sm btn-light action-btn" title="Delete"><i class="fas fa-trash text-danger"></i></button>
                            </td>
                        </tr>
                        <tr>
                            <td>#PT-8822</td>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <span class="fw-bold">John Doe</span>
                                </div>
                            </td>
                            <td>johndoe@example.com</td>
                            <td>Sep 02, 2023</td>
                            <td><span class="badge bg-secondary">Inactive</span></td>
                            <td>
                                <button class="btn btn-sm btn-light action-btn" title="View Profile"><i class="fas fa-eye text-primary"></i></button>
                                <button class="btn btn-sm btn-light action-btn" title="Delete"><i class="fas fa-trash text-danger"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
