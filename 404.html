<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page Not Found | Stackly Mental Health Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Source+Sans+3:wght@400;600&display=swap"

    <link href="css/style.css" rel="stylesheet" />
    <link href="css/error.css" rel="stylesheet" />
    <style>
        .tilt-card {
            transform-style: preserve-3d;
        }
    </style>
</head>



<body class="error-page-body overflow-hidden">

    <section
        class="error-section min-vh-100 d-flex align-items-center justify-content-center position-relative overflow-hidden">
        <div class="error-blob-bg"></div>
        <div class="error-texture-overlay"></div>

        <!-- Floating background icons -->
        <div class="floating-icons">
            <span class="material-symbols-outlined hero-shape hero-shape-1">psychology</span>
            <span class="material-symbols-outlined hero-shape hero-shape-2">favorite</span>
            <span class="material-symbols-outlined hero-shape hero-shape-3">spa</span>
            <span class="material-symbols-outlined hero-shape hero-shape-4">self_improvement</span>
            <span class="material-symbols-outlined hero-shape hero-shape-5">water_drop</span>
            <span class="material-symbols-outlined hero-shape hero-shape-6">sentiment_very_satisfied</span>
            <span class="material-symbols-outlined hero-shape hero-shape-7">sunny</span>
            <span class="material-symbols-outlined hero-shape hero-shape-8">groups</span>
        </div>

        <div class="container position-relative z-3">
            <div class="row justify-content-center">
                <div class="col-lg-8 text-center">
                    <div class="error-glass-card p-4 p-md-5 rounded-5" data-aos="zoom-in">
                        <div class="error-display mb-2">
                            <span class="digit">4</span>
                            <span class="icon-center"><span
                                    class="material-symbols-outlined text-primary">psychology</span></span>
                            <span class="digit">4</span>
                        </div>

                        <h2 class="text-primary font-display-lg mb-2">Oops! Page Not <span
                                class="text-primary">Found</span></h2>
                        <p class="text-on-surface-variant font-body-lg mb-5 mx-auto" style="max-width: 550px;">
                            We couldn't find the page you requested. Let's help you reconnect with the resources,
    support, and wellness services that matter most.
                        </p>



                        <div class="d-flex flex-column flex-sm-row gap-3 justify-content-center pt-2">
                            <a href="index.html" class="thm-btn-primary px-5">
                                <i class="fas fa-home me-2"></i> Return Home
                            </a>
                            <button onclick="history.back()" class="thm-btn-outline px-5">
                                <span class="material-symbols-outlined fs-6 me-2">arrow_backward</span> Go Back
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 1000, once: true });</script>
    <script src="./js/script.js"></script>
</body>

</html>
