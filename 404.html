<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page Not Found | Meciy Mental Health Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="css/style.css" rel="stylesheet" />
    <link href="css/error.css" rel="stylesheet" />
    <style>
        .tilt-card { transform-style: preserve-3d; }
    </style>
</head>

<body>
    <!-- The header will be injected here -->
    <div id="header-placeholder"></div>

    <main class="error-page-wrapper">
        <div class="container-xl" data-tilt data-tilt-max="5" data-tilt-glare data-tilt-max-glare="0.2">
            <div class="tilt-card-inner">
                <div class="error-illustration">
                    <i class="fas fa-compass"></i>
                </div>
                <h1 class="error-code">404</h1>
                <h2 class="error-title">Feeling a little lost?</h2>
                <p class="error-message">It looks like the page you are looking for has moved or doesn't exist. Let's get you back on the right path.</p>
                
                <div class="d-flex flex-column flex-sm-row justify-content-center gap-3">
                    <a href="index.html" class="btn thm-btn-primary rounded-pill py-3 px-4 fw-bold">
                        <i class="fas fa-home me-2"></i> Return Home
                    </a>
                    <a href="contact.html" class="btn btn-outline-primary rounded-pill py-3 px-4 fw-bold">
                        <i class="fas fa-headset me-2"></i> Contact Support
                    </a>
                </div>
            </div>
        </div>
    </main>

    <!-- The footer will be injected here -->
    <div id="footer-placeholder"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
